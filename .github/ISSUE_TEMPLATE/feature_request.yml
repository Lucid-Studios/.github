name: Shared workflow or template request
description: Propose a new org-level template, workflow, or governance improvement.
title: "[Request]: "
labels:
  - enhancement
body:
  - type: textarea
    id: request
    attributes:
      label: Request
      description: Describe the shared capability or improvement you want added.
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Explain why this should be shared across repositories.
    validations:
      required: true
  - type: textarea
    id: repos
    attributes:
      label: Repositories affected
      description: List the Lucid Studios repositories that would use or benefit from it.
