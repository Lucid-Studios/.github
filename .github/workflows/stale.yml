name: Stale

on:
  schedule:
    - cron: '0 14 * * 1'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          stale-issue-message: This issue has gone inactive and will be closed if no follow-up is added.
          stale-pr-message: This pull request has gone inactive and will be closed if no follow-up is added.
          days-before-issue-stale: 30
          days-before-pr-stale: 21
          days-before-issue-close: 14
          days-before-pr-close: 14
          exempt-issue-labels: security,pinned,governance
          exempt-pr-labels: security,pinned,governance
