name: Repo Health Audit

on:
  schedule:
    - cron: '0 13 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Audit organization repositories
        uses: actions/github-script@v7
        with:
          script: |
            const org = context.repo.owner;
            const repos = await github.paginate(github.rest.repos.listForOrg, {
              org,
              per_page: 100,
              type: "all"
            });

            const requiredFiles = ["README.md"];
            const recommendedFiles = ["SECURITY.md", "CONTRIBUTING.md", "LICENSE"];
            const lines = ["## Lucid Studios Repository Health Audit", ""];

            for (const repo of repos.filter(r => !r.archived && !r.disabled)) {
              lines.push(`### ${repo.name}`);
              lines.push(`- default branch: ${repo.default_branch || "unknown"}`);

              for (const file of requiredFiles) {
                try {
                  await github.rest.repos.getContent({
                    owner: org,
                    repo: repo.name,
                    path: file
                  });
                  lines.push(`- required \`${file}\`: present`);
                } catch (error) {
                  lines.push(`- required \`${file}\`: missing`);
                }
              }

              for (const file of recommendedFiles) {
                try {
                  await github.rest.repos.getContent({
                    owner: org,
                    repo: repo.name,
                    path: file
                  });
                  lines.push(`- recommended \`${file}\`: present`);
                } catch (error) {
                  lines.push(`- recommended \`${file}\`: missing or inherited`);
                }
              }

              lines.push("");
            }

            core.summary.addRaw(lines.join("\n")).write();
